name: Verify Humanity Chain Archive

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          echo "Checking repository structure..."

          required_paths=(
            "README.md"
            "LICENSE"
            "GENESIS_BLOCK.md"
            "docs"
            "halkalar"
            "hash"
            "records"
            "schema"
            "src"
          )

          for path in "${required_paths[@]}"
          do
            if [ ! -e "$path" ]; then
              echo "Missing required path: $path"
              exit 1
            fi
          done

          echo "Repository structure verified."

      - name: Verify JSON schema exists
        run: |
          if [ ! -f "schema/record-v1.schema.json" ]; then
            echo "Schema file missing."
            exit 1
          fi

          echo "Schema file exists."

      - name: Verify Python source files
        run: |
          required_scripts=(
            "src/verify_hashes.py"
            "src/normalize_records.py"
            "src/generate_index.py"
          )

          for script in "${required_scripts[@]}"
          do
            if [ ! -f "$script" ]; then
              echo "Missing script: $script"
              exit 1
            fi
          done

          echo "Python source files verified."

      - name: Verify records directory
        run: |
          if [ ! -d "records" ]; then
            echo "Records directory missing."
            exit 1
          fi

          echo "Records directory verified."

      - name: Archive verification complete
        run: |
          echo "Humanity Chain archive verification completed successfully."
