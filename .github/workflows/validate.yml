name: Humanity Chain Validation

on:
  push:
    paths:
      - 'records/**'
      - 'schema/**'
      - 'src/**'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'records/**'
      - 'schema/**'
      - 'src/**'
      - '.github/workflows/validate.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate records against schema
        run: |
          python - <<'PY'
          import json
          import os
          from jsonschema import validate

          schema_path = "schema/record-v1.schema.json"
          records_dir = "records"

          with open(schema_path, "r", encoding="utf-8") as f:
              schema = json.load(f)

          for root, _, files in os.walk(records_dir):
              for file in files:
                  if file.endswith(".json"):
                      path = os.path.join(root, file)
                      with open(path, "r", encoding="utf-8") as f:
                          record = json.load(f)
                      validate(instance=record, schema=schema)
                      print(f"PASS: {path}")

          print("All records validated successfully.")
          PY

      - name: Verify content hashes
        run: python src/verify_hashes.py records
